```html
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Masterthesis Countdown</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;

      font-family: Arial, sans-serif;
      text-align: center;
      color: #1f2937;

      background: linear-gradient(
        135deg,
        #ffb6c1,
        #d8b4fe,
        #93c5fd,
        #86efac
      );

      background-size: 300% 300%;
      animation: farbverlauf 12s ease infinite;

      position: relative;
      overflow: hidden;
    }

    @keyframes farbverlauf {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Das Bild liegt über dem Farbverlauf */
    body::before {
      content: "";
      position: fixed;
      inset: 0;

      background-image: url("hintergrund.jpeg");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;

      z-index: 0;
      pointer-events: none;
    }

    /* Der Countdown liegt über dem Bild */
    .container {
      width: 70%;
      max-width: 700px;
      padding: 25px 20px;

      background-color: rgba(255, 255, 255, 0.78);
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);

      position: relative;
      z-index: 2;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 2.5rem;
    }

    .subtitle {
      margin-bottom: 30px;
      font-size: 1.2rem;
      color: #6b7280;
    }

    .countdown {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .time-box {
      min-width: 120px;
      padding: 20px;
      border-radius: 16px;
      background-color: #f3f4f6;
    }

    .number {
      display: block;
      font-size: 2.5rem;
      font-weight: bold;
      color: #7c3aed;
    }

    .label {
      display: block;
      margin-top: 8px;
      font-size: 1rem;
      color: #6b7280;
    }

    #message {
      margin-top: 30px;
      margin-bottom: 0;
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Konfetti liegt über allem */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      z-index: 9999;
      pointer-events: none;
    }

    /*
      HANDY IM HOCHFORMAT

      Das Bild wird vollständig angezeigt.
      Es können dadurch bunte Flächen oberhalb oder
      unterhalb des Bildes sichtbar sein.
    */
    @media (max-width: 700px) and (orientation: portrait) {
      body {
        padding: 10px;
        align-items: center;
      }

      body::before {
        background-size: contain;
        background-position: center;
      }

      .container {
        width: 90%;
        max-width: 350px;
        padding: 16px 10px;

        background-color: rgba(255, 255, 255, 0.7);
        border-radius: 20px;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 1.35rem;
        line-height: 1.2;
      }

      .subtitle {
        margin-top: 0;
        margin-bottom: 14px;
        font-size: 0.9rem;
      }

      .countdown {
        gap: 6px;
      }

      .time-box {
        min-width: 66px;
        padding: 10px 6px;
        border-radius: 11px;
      }

      .number {
        font-size: 1.5rem;
      }

      .label {
        margin-top: 4px;
        font-size: 0.72rem;
      }

      #message {
        margin-top: 14px;
        font-size: 0.9rem;
      }
    }

    /*
      HANDY IM QUERFORMAT

      Das Bild wird vollständig angezeigt.
      Der Countdown wird flacher und breiter.
    */
    @media (max-width: 950px) and (orientation: landscape) {
      body {
        padding: 8px;
        align-items: center;
      }

      body::before {
        background-size: contain;
        background-position: center;
      }

      .container {
        width: 75%;
        max-width: 620px;
        padding: 12px 16px;

        background-color: rgba(255, 255, 255, 0.68);
        border-radius: 18px;
      }

      h1 {
        margin-bottom: 7px;
        font-size: 1.3rem;
        line-height: 1.15;
      }

      .subtitle {
        margin-top: 0;
        margin-bottom: 9px;
        font-size: 0.88rem;
      }

      .countdown {
        flex-wrap: nowrap;
        gap: 8px;
      }

      .time-box {
        min-width: 82px;
        padding: 8px 7px;
        border-radius: 10px;
      }

      .number {
        font-size: 1.5rem;
      }

      .label {
        margin-top: 3px;
        font-size: 0.72rem;
      }

      #message {
        margin-top: 9px;
        font-size: 0.85rem;
      }
    }

    /*
      Sehr kleine Handys im Hochformat
    */
    @media (max-width: 380px) and (orientation: portrait) {
      .container {
        width: 94%;
        padding: 14px 8px;
      }

      h1 {
        font-size: 1.2rem;
      }

      .subtitle {
        font-size: 0.82rem;
      }

      .countdown {
        gap: 5px;
      }

      .time-box {
        min-width: 62px;
        padding: 9px 5px;
      }

      .number {
        font-size: 1.35rem;
      }

      .label {
        font-size: 0.68rem;
      }

      #message {
        font-size: 0.82rem;
      }
    }
  </style>
</head>

<body>

  <main class="container">
    <h1>Countdown zu Senas Masterthesis-Abgabe</h1>

    <p class="subtitle">
      Bis zur Abgabe meiner Masterarbeit sind es noch:
    </p>

    <div class="countdown">
      <div class="time-box">
        <span class="number" id="days">0</span>
        <span class="label">Tage</span>
      </div>

      <div class="time-box">
        <span class="number" id="hours">0</span>
        <span class="label">Stunden</span>
      </div>

      <div class="time-box">
        <span class="number" id="minutes">0</span>
        <span class="label">Minuten</span>
      </div>

      <div class="time-box">
        <span class="number" id="seconds">0</span>
        <span class="label">Sekunden</span>
      </div>
    </div>

    <p id="message"></p>
  </main>

  <canvas id="confetti-canvas"></canvas>

  <script>
    /*
      HIER TRÄGST DU DEINE DEADLINE EIN.

      Format:
      Jahr-Monat-TagTStunde:Minute:Sekunde
    */
    const deadline = new Date("2026-07-02T23:59:00");

    let konfettiGestartet = false;
    let countdownIntervall;

    function starteKonfetti() {
      const canvas = document.getElementById("confetti-canvas");
      const context = canvas.getContext("2d");

      let bildschirmBreite = window.innerWidth;
      let bildschirmHoehe = window.innerHeight;

      function passeCanvasAn() {
        bildschirmBreite = window.innerWidth;
        bildschirmHoehe = window.innerHeight;

        canvas.width = bildschirmBreite;
        canvas.height = bildschirmHoehe;
      }

      passeCanvasAn();

      window.addEventListener("resize", passeCanvasAn);

      const farben = [
        "#ff4d6d",
        "#ffbe0b",
        "#3a86ff",
        "#8338ec",
        "#06d6a0",
        "#fb5607",
        "#ffffff",
        "#ff85a1"
      ];

      const teilchen = [];

      for (let i = 0; i < 350; i++) {
        teilchen.push({
          x: Math.random() * bildschirmBreite,
          y: -20 - Math.random() * bildschirmHoehe,

          breite: 6 + Math.random() * 8,
          hoehe: 8 + Math.random() * 12,

          geschwindigkeitX: -3 + Math.random() * 6,
          geschwindigkeitY: 2 + Math.random() * 5,

          drehung: Math.random() * Math.PI * 2,
          drehGeschwindigkeit: -0.2 + Math.random() * 0.4,

          schwingen: Math.random() * Math.PI * 2,

          farbe: farben[
            Math.floor(Math.random() * farben.length)
          ]
        });
      }

      const startzeit = Date.now();
      const dauer = 12000;

      function zeichneKonfetti() {
        context.clearRect(
          0,
          0,
          bildschirmBreite,
          bildschirmHoehe
        );

        teilchen.forEach(function (stueck) {
          stueck.schwingen += 0.05;

          stueck.x +=
            stueck.geschwindigkeitX +
            Math.sin(stueck.schwingen) * 1.2;

          stueck.y += stueck.geschwindigkeitY;
          stueck.drehung += stueck.drehGeschwindigkeit;

          context.save();

          context.translate(stueck.x, stueck.y);
          context.rotate(stueck.drehung);
          context.fillStyle = stueck.farbe;

          context.fillRect(
            -stueck.breite / 2,
            -stueck.hoehe / 2,
            stueck.breite,
            stueck.hoehe
          );

          context.restore();

          if (stueck.y > bildschirmHoehe + 30) {
            stueck.y = -30;
            stueck.x = Math.random() * bildschirmBreite;
          }

          if (stueck.x < -30) {
            stueck.x = bildschirmBreite + 30;
          }

          if (stueck.x > bildschirmBreite + 30) {
            stueck.x = -30;
          }
        });

        if (Date.now() - startzeit < dauer) {
          requestAnimationFrame(zeichneKonfetti);
        } else {
          context.clearRect(
            0,
            0,
            bildschirmBreite,
            bildschirmHoehe
          );

          window.removeEventListener(
            "resize",
            passeCanvasAn
          );
        }
      }

      zeichneKonfetti();
    }

    function updateCountdown() {
      const now = new Date();
      const remainingTime = deadline - now;
      const message = document.getElementById("message");

      if (remainingTime <= 0) {
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "0";
        document.getElementById("minutes").textContent = "0";
        document.getElementById("seconds").textContent = "0";

        message.textContent =
          "FREE SENA! Die Masterthesis ist abgegeben! 🎓🎉";

        if (!konfettiGestartet) {
          konfettiGestartet = true;
          starteKonfetti();
        }

        clearInterval(countdownIntervall);
        return;
      }

      const days = Math.floor(
        remainingTime / (1000 * 60 * 60 * 24)
      );

      const hours = Math.floor(
        (remainingTime / (1000 * 60 * 60)) % 24
      );

      const minutes = Math.floor(
        (remainingTime / (1000 * 60)) % 60
      );

      const seconds = Math.floor(
        (remainingTime / 1000) % 60
      );

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;

      message.textContent =
        "Abgabe am " +
        deadline.toLocaleString("de-DE", {
          dateStyle: "long",
          timeStyle: "short"
        });
    }

    updateCountdown();

    countdownIntervall = setInterval(
      updateCountdown,
      1000
    );
  </script>

</body>
</html>
